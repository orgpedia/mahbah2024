description: This folder(task) runs the cid extractor, extracts tables and paragraphs, translates them and writes as a text file.

ignore_docs: [202408091111183534.pdf, 202408131653337534.pdf, 202408131716379734.pdf, 202408201433290834.pdf, 202408201436105234.pdf, 202408201439270734.pdf, 202408201449314834.pdf, 202408201454411334.pdf, 202408201457139034.pdf, 202408201500475434.pdf, 202408201515393834.pdf, 202408201516418134.pdf, 202408201518584834.pdf, 202410071627381534.pdf, 202410071646425834.pdf, 202410111942163234.pdf, 202507081616570034.pdf, 202508201914202034.pdf, 202510171751178734.pdf, 202510171753492934.pdf, 202512231531487934.pdf ]

output_dir: 'output'
config_dir: 'conf'
output_stub: 'doc'

pipeline:
  - name: pdf_cid_info

  - name: pdf_cid_reader
    config:
        swap_cids: [['sakalmarathi', 66, 126]] # u and dot (mumbai)

  - name: word_recognizer

  - name: pdftable_finder
    config:
      skip_row_with_merged_cells: False
      heading_offset: 0 # ignore heading
      header_row: never
      pdfplumber_config:
        vertical_strategy: lines
        horizontal_strategy: lines

  - name: line_finder
    config:
      keep_empty_lines: True
      quick: True
      newline_height_multiple: 1.6

  - name: para_finder
    config:
      write_output: False

  - name: extract_order_number      

  - name: doc_translator_hf
    config:
      src_lang: 'mar_Deva'
      tgt_lang: 'eng_Latn'

  - name: text_writer
    config:
      languages: ['en', 'mr']
